<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
  <title>Partager votre écran</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-900: #12121a;
      --bg-800: #22222e;
      --bg-700: #2a2a38;
      --accent: #8b5cf6;
      --accent-hover: #7c3aed;
    }

    body {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-900);
      color: #e8e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 20px 18px;
      border-bottom: 1px solid var(--bg-700);
      -webkit-app-region: drag;
      flex-shrink: 0;
    }

    .header-title {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.2px;
    }

    .header-close {
      -webkit-app-region: no-drag;
      width: 30px;
      height: 30px;
      border: none;
      background: transparent;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #71717a;
      transition: background 0.15s, color 0.15s;
    }
    .header-close:hover {
      background: var(--bg-700);
      color: #f4f4f5;
    }
    .header-close svg { width: 16px; height: 16px; }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 4px;
      padding: 16px 20px 0;
      flex-shrink: 0;
    }

    .tab {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      background: var(--bg-800);
      color: #71717a;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .tab:hover {
      background: var(--bg-700);
      color: #fff;
    }
    .tab.active {
      background: var(--accent);
      color: #fff;
    }
    .tab svg { width: 14px; height: 14px; flex-shrink: 0; }

    /* ── Grid ── */
    .grid-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
    }

    .grid-container::-webkit-scrollbar { width: 6px; }
    .grid-container::-webkit-scrollbar-track { background: transparent; }
    .grid-container::-webkit-scrollbar-thumb {
      background: var(--bg-700);
      border-radius: 3px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .source-card {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 8px;
      background: var(--bg-800);
      border: 1px solid var(--bg-700);
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      text-align: left;
    }
    .source-card:hover {
      background: var(--bg-700);
      border-color: var(--accent);
      transform: translateY(-1px);
    }
    .source-card.selected {
      border-color: var(--accent);
      background: rgba(139, 92, 246, 0.1);
    }

    .thumbnail-wrapper {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: var(--bg-900);
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .thumbnail {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .thumbnail-empty {
      color: #52525b;
      opacity: 0.5;
    }
    .thumbnail-empty svg { width: 32px; height: 32px; }

    .selected-badge {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 20px;
      height: 20px;
      background: var(--accent);
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .source-card.selected .selected-badge { display: flex; }
    .selected-badge svg { width: 11px; height: 11px; color: #fff; }

    .source-info {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 4px;
    }

    .app-icon {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      flex-shrink: 0;
      object-fit: contain;
    }

    .source-icon {
      width: 14px;
      height: 14px;
      color: var(--accent);
      flex-shrink: 0;
    }

    .source-name {
      font-size: 11px;
      font-weight: 500;
      color: #a1a1aa;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 0.15s;
    }
    .source-card:hover .source-name { color: #fff; }

    /* ── Loading ── */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 200px;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 2px solid var(--bg-700);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Empty state ── */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 180px;
      color: #52525b;
      gap: 10px;
      grid-column: 1 / -1;
    }
    .empty svg { width: 36px; height: 36px; }
    .empty p { font-size: 13px; }

    /* ── Footer ── */
    .footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      padding: 14px 20px;
      border-top: 1px solid var(--bg-700);
      flex-shrink: 0;
    }

    .btn {
      padding: 8px 18px;
      border-radius: 8px;
      border: none;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }

    .btn-cancel {
      background: var(--bg-800);
      color: #71717a;
    }
    .btn-cancel:hover {
      background: var(--bg-700);
      color: #e4e4e7;
    }

    .btn-share {
      background: var(--accent);
      color: #fff;
    }
    .btn-share:hover { background: var(--accent-hover); }
    .btn-share:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }
    .btn-share:disabled:active { transform: none; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <span class="header-title">Choisir ce que tu veux partager</span>
    <button class="header-close" id="btnClose" title="Fermer">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" id="tabAll" data-filter="all">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
      </svg>
      Tout
    </button>
    <button class="tab" id="tabScreens" data-filter="screen">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="3" width="20" height="14" rx="2"/>
        <line x1="8" y1="21" x2="16" y2="21"/>
        <line x1="12" y1="17" x2="12" y2="21"/>
      </svg>
      Écrans
    </button>
    <button class="tab" id="tabWindows" data-filter="window">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <line x1="3" y1="9" x2="21" y2="9"/>
        <line x1="9" y1="9" x2="9" y2="21"/>
      </svg>
      Fenêtres
    </button>
  </div>

  <!-- Grid -->
  <div class="grid-container" id="gridContainer">
    <div class="loading">
      <div class="spinner"></div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <button class="btn btn-cancel" id="btnCancel">Annuler</button>
    <button class="btn btn-share" id="btnShare" disabled>Partager l'écran</button>
  </div>

  <script>
    let allSources = [];
    let selectedId = null;
    let currentFilter = 'all';

    const gridContainer = document.getElementById('gridContainer');
    const btnShare = document.getElementById('btnShare');
    const btnCancel = document.getElementById('btnCancel');
    const btnClose = document.getElementById('btnClose');

    // Inline SVG icons
    const monitorIcon = `<svg class="source-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>`;
    const windowIcon = `<svg class="source-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="9" x2="9" y2="21"/></svg>`;
    const checkIcon = `<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1.5,6 4.5,9 10.5,3"/></svg>`;
    const emptyIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>`;

    function isScreen(source) {
      return source.id.startsWith('screen:');
    }

    function renderGrid() {
      const filtered = allSources.filter(s => {
        if (currentFilter === 'screen') return isScreen(s);
        if (currentFilter === 'window') return !isScreen(s);
        return true;
      });

      const grid = document.createElement('div');
      grid.className = 'grid';
      grid.id = 'grid';

      if (filtered.length === 0) {
        grid.innerHTML = `
          <div class="empty">
            ${emptyIcon}
            <p>Aucune ${currentFilter === 'screen' ? 'écran' : currentFilter === 'window' ? 'fenêtre' : 'source'} disponible</p>
          </div>`;
        gridContainer.innerHTML = '';
        gridContainer.appendChild(grid);
        return;
      }

      grid.innerHTML = filtered.map(source => {
        const screen = isScreen(source);
        const iconHtml = source.appIcon
          ? `<img class="app-icon" src="${source.appIcon}" alt="">`
          : (screen ? monitorIcon : windowIcon);

        const thumbHtml = source.thumbnail
          ? `<img class="thumbnail" src="${source.thumbnail}" alt="${source.name}">`
          : `<div class="thumbnail-empty">${emptyIcon}</div>`;

        return `
          <button class="source-card ${source.id === selectedId ? 'selected' : ''}" data-id="${source.id}">
            <div class="thumbnail-wrapper">
              ${thumbHtml}
              <div class="selected-badge">${checkIcon}</div>
            </div>
            <div class="source-info">
              ${iconHtml}
              <span class="source-name" title="${source.name}">${source.name}</span>
            </div>
          </button>`;
      }).join('');

      gridContainer.innerHTML = '';
      gridContainer.appendChild(grid);

      // Events
      document.querySelectorAll('.source-card').forEach(card => {
        card.addEventListener('click', () => {
          selectedId = card.dataset.id;
          btnShare.disabled = false;
          document.querySelectorAll('.source-card').forEach(c => c.classList.remove('selected'));
          card.classList.add('selected');
        });
        card.addEventListener('dblclick', () => {
          selectedId = card.dataset.id;
          share();
        });
      });
    }

    function share() {
      if (!selectedId) return;
      window.screenPickerAPI.select(selectedId);
    }

    function cancel() {
      window.screenPickerAPI.cancel();
    }

    btnShare.addEventListener('click', share);
    btnCancel.addEventListener('click', cancel);
    btnClose.addEventListener('click', cancel);

    // Tabs
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        currentFilter = tab.dataset.filter;
        selectedId = null;
        btnShare.disabled = true;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        renderGrid();
      });
    });

    // Keyboard
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') cancel();
      if (e.key === 'Enter' && !btnShare.disabled) share();
    });

    // Receive sources from main process
    window.screenPickerAPI.onSources(sources => {
      allSources = sources;
      renderGrid();
    });
  </script>
</body>
</html>
