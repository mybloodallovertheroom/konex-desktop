<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; media-src 'self' https://cdn.konex.sh blob: file:; img-src 'self' data: https: file:;">
  <title>Konex</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      -webkit-app-region: drag;
      user-select: none;
    }

    .splash-card {
      width: 400px;
      background: #0b0b0d;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow:
        0 25px 50px -12px rgba(0, 0, 0, 0.8),
        0 0 0 1px rgba(255, 255, 255, 0.02) inset;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    .splash-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
    }

    .splash-card.fade-out {
      opacity: 0;
      transform: scale(0.95);
    }

    .video-container {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .loader-video {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 16px;
    }

    .fallback-loader {
      width: 100%;
      height: 100%;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .fallback-loader.active {
      display: flex;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(99, 102, 241, 0.2);
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

  </style>
</head>
<body>
  <div class="splash-card" id="splashCard">
    <div class="video-container">
      <video
        id="loaderVideo"
        class="loader-video"
        playsinline
        style="display: none;"
      ></video>
      <div id="fallbackLoader" class="fallback-loader active">
        <div class="spinner"></div>
      </div>
    </div>
  </div>

  <script>
    const LOCAL_VIDEO_PATH = './loader.mp4';

    const video = document.getElementById('loaderVideo');
    const fallbackLoader = document.getElementById('fallbackLoader');
    const splashCard = document.getElementById('splashCard');

    let videoPlayed = false;
    let appReady = false;

    // Signal to main process that we can launch
    function signalReady() {
      if (window.electron) {
        splashCard.classList.add('fade-out');
        setTimeout(() => {
          window.electron.app.ready();
        }, 400);
      }
    }

    // When video ends, signal ready
    video.addEventListener('ended', () => {
      videoPlayed = true;
      if (appReady) {
        signalReady();
      }
    });

    // App loaded callback from main process
    function onAppLoaded() {
      appReady = true;

      // If video already played or no video, signal ready
      if (videoPlayed || video.style.display === 'none') {
        signalReady();
      }
    }

    // Try to load video
    async function loadVideo() {
      try {
        video.src = LOCAL_VIDEO_PATH;

        video.oncanplay = () => {
          // Video loaded successfully
          fallbackLoader.classList.remove('active');
          video.style.display = 'block';
          video.play().catch(() => {
            // Autoplay blocked, show fallback
            showFallback();
          });
        };

        video.onerror = () => {
          showFallback();
        };

      } catch (err) {
        showFallback();
      }
    }

    function showFallback() {
      video.style.display = 'none';
      fallbackLoader.classList.add('active');
      videoPlayed = true; // Skip video wait
    }

    // Listen for app ready signal
    if (window.electron) {
      window.electron.splash.onAppReady(() => {
        onAppLoaded();
      });
    } else {
      // Dev mode fallback
      setTimeout(onAppLoaded, 2000);
    }

    // Start loading video
    loadVideo();
  </script>
</body>
</html>
